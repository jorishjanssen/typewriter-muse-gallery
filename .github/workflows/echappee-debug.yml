name: Échappée debug

# Manual diagnostics: probe the public API and inspect the production DB.
# Prints no secrets — only row counts, ids, column types and API responses.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed app base URL
        default: https://echappee-self.vercel.app
      article_id:
        description: Article id to test the single-article path with
        default: '5'

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: echappee
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: echappee/package-lock.json
      - run: npm ci

      - name: Probe public API
        env:
          BASE: ${{ inputs.base_url }}
          ID: ${{ inputs.article_id }}
        run: |
          for path in /api/status "/api/articles/$ID" "/api/feed?limit=2"; do
            echo "=== GET $path"
            curl -sS -w '\n(http %{http_code})\n' "$BASE$path" | head -c 3000
            echo
          done

      - name: Probe feeds for premium/video markers
        run: |
          node --input-type=module -e "
          import Parser from 'rss-parser';
          const parser = new Parser({ timeout: 20000, customFields: { item: [['content:encoded','enc']] } });
          for (const url of ['https://www.wielerflits.nl/feed/', 'https://sporza.be/nl/categorie/wielrennen.rss.xml']) {
            console.log('=== FEED', url);
            try {
              const feed = await parser.parseURL(url);
              for (const i of (feed.items ?? []).slice(0, 20)) {
                const cats = (i.categories ?? []).map(c => typeof c === 'string' ? c : (c?._ ?? JSON.stringify(c))).join('|');
                console.log(JSON.stringify({ t: i.title?.slice(0, 55), link: i.link, cats, encLen: (i.enc ?? '').length }));
              }
            } catch (e) { console.log('feed error:', e.message); }
          }
          process.exit(0);
          "

      - name: LLM ping (verifies AI Gateway / provider key)
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.ECHAPPEE_AI_GATEWAY_API_KEY }}
          LLM_API_KEY: ${{ secrets.ECHAPPEE_LLM_API_KEY }}
          LLM_MODEL: ${{ vars.ECHAPPEE_LLM_MODEL }}
        run: |
          node --input-type=module -e "
          import OpenAI from 'openai';
          const gw = (process.env.AI_GATEWAY_API_KEY ?? '').trim();
          const direct = (process.env.LLM_API_KEY ?? '').trim();
          if (!gw && !direct) { console.log('LLM: no key configured'); process.exit(0); }
          const base = direct ? 'https://api.deepseek.com' : 'https://ai-gateway.vercel.sh/v1';
          const model = (process.env.LLM_MODEL ?? '').trim() || (direct ? 'deepseek-chat' : 'deepseek/deepseek-v3.1');
          const client = new OpenAI({ baseURL: base, apiKey: direct || gw });
          try {
            const res = await client.chat.completions.create({ model, messages: [{ role: 'user', content: 'Reply with exactly: OK' }], max_tokens: 5 });
            console.log('LLM ping ok — model:', model, 'reply:', JSON.stringify(res.choices[0]?.message?.content));
          } catch (e) {
            console.log('LLM ping FAILED — model:', model, 'status:', e.status ?? 'n/a', 'error:', e.message);
          }
          process.exit(0);
          "

      - name: Inspect database
        env:
          DATABASE_URL: ${{ secrets.ECHAPPEE_DATABASE_URL }}
          ID: ${{ inputs.article_id }}
        run: |
          node --input-type=module -e "
          import postgres from 'postgres';
          const sql = postgres(process.env.DATABASE_URL, { max: 1 });
          const id = Number(process.env.ID ?? 5);
          console.log('counts:', await sql.unsafe('SELECT COUNT(*)::int AS n, MIN(id)::int AS min, MAX(id)::int AS max FROM articles'));
          console.log('first ids:', await sql.unsafe('SELECT id FROM articles ORDER BY id LIMIT 5'));
          console.log('id column:', await sql.unsafe(\"SELECT column_name, data_type FROM information_schema.columns WHERE table_name='articles' AND column_name='id'\"));
          console.log('by id (param):', await sql.unsafe('SELECT id, title FROM articles WHERE id = \$1', [id]));
          console.log('content health:', await sql.unsafe(\"SELECT source_key, COUNT(*)::int AS total, SUM(CASE WHEN content_text IS NULL OR LENGTH(content_text) < 200 THEN 1 ELSE 0 END)::int AS thin FROM articles GROUP BY source_key ORDER BY source_key\"));
          console.log('thin articles:', await sql.unsafe(\"SELECT id, source_key, url, LEFT(title, 70) AS title, COALESCE(LENGTH(content_text),0)::int AS len FROM articles WHERE content_text IS NULL OR LENGTH(content_text) < 200 ORDER BY id DESC LIMIT 15\"));
          console.log('enrichment:', await sql.unsafe(\"SELECT COUNT(*)::int AS total, SUM(CASE WHEN summary IS NOT NULL THEN 1 ELSE 0 END)::int AS enriched FROM articles\"));
          await sql.end({ timeout: 5 });
          process.exit(0);
          "
