name: Échappée scraper

# Scrapes the configured cycling news sources into the production Postgres
# database (Neon) that the Vercel deployment reads from.
#
# Required repository secrets:
#   ECHAPPEE_DATABASE_URL        — Postgres connection string (from Neon/Vercel)
#   ECHAPPEE_AI_GATEWAY_API_KEY  — optional; Vercel AI Gateway key, enables AI
#                                  summaries/clustering (one key, any model)
#   ECHAPPEE_LLM_API_KEY         — optional alternative: a direct provider key
# Optional repository variable:
#   ECHAPPEE_LLM_MODEL           — gateway model slug, e.g. deepseek/deepseek-v3.1
#                                  or anthropic/claude-haiku-4.5 (switch any time)
#
# Note: scheduled workflows only run from the repository's default branch.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: echappee-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: echappee
    steps:
      - uses: actions/checkout@v4

      - name: Check configuration
        env:
          DATABASE_URL: ${{ secrets.ECHAPPEE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::ECHAPPEE_DATABASE_URL secret is not set — add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: echappee/package-lock.json

      - run: npm ci

      - name: Scrape all sources
        env:
          DATABASE_URL: ${{ secrets.ECHAPPEE_DATABASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.ECHAPPEE_AI_GATEWAY_API_KEY }}
          LLM_API_KEY: ${{ secrets.ECHAPPEE_LLM_API_KEY }}
          LLM_MODEL: ${{ vars.ECHAPPEE_LLM_MODEL }}
          # CI runs on a 30-min cadence with a 25-min cap: keep runs snappy.
          # Progress persists per article, so a capped run just continues next time.
          SCRAPE_PER_HOST_DELAY_MS: '250'
          SCRAPE_FETCH_TIMEOUT_MS: '10000'
          SCRAPE_MAX_ITEMS: '15'
        run: npm run refresh --workspace server
